server:
  port: 8500

spring:
  application:
    name: cloud-openfeign
  openfeign:
    client:
      config:
        default:
          connectTimeout: 3000 # 连接超时时间
          readTimeout: 3000 # 请求处理超时时间

eureka:
  client:
    register-with-eureka: true # 向注册中心注册自己
    fetch-registry: true # 拉取注册中心的信息
    service-url:
      defaultZone: http://127.0.0.1:7001/eureka,http://127.0.0.1:7002/eureka