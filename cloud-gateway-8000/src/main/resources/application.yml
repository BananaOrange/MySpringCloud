server:
  port: 8000

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true  #开启从注册中心动态创建路由的功能，利用微服务名称进行路由
      routes:
        - id: service-a-route #路由的id,没有规定规则但要求唯一,建议配合服务名
          # uri: http://localhost:9001  #匹配后提供服务的路由地址
          uri: lb://service-a
          predicates:
            - Path=/service-a/** #断言，路径相匹配的进行路由

        - id: service-b-route
          uri: lb://service-b
          # filters:
          #  - AddRequestParameter=X-Request-Id, 1024 #过滤器工厂会在匹配的请求头加上一对请求头，名称为X-Request-Id,值为1024
          predicates:
            - Path=/service-b/**

        - id: service-c-route
          uri: lb://service-c
          predicates:
            - Path=/service-c/**
            #指定时间后才能访问（After）时间往后写一小时
#            - After=2020-06-17T12:53:40.325+08:00[Asia/Shanghai]
#           指定时间前才能访问（Before）
#            - Before=2020-06-17T11:53:40.325+08:00[Asia/Shanghai]
#           指定时间内才能访问（Between）
#            - Between=2020-06-17T11:53:40.325+08:00[Asia/Shanghai],2020-06-17T12:53:40.325+08:00[Asia/Shanghai]
#            - Cookie=username,angenin   #带Cookie，username的值为angenin
#            - Header=X-Request-Id, \d+   #请求头要有 X-Request-Id属性并且值为整数的正则表达式
#            - Host=**.angenin.com    #Host: xxx.angenin.com 请求是Host必须有**.angenin.com
#            - Method=GET  #只允许get请求访问
#            - Query=username, \d+   #url请求地址必须带上username参数，并且值必须为整数

eureka:
  client:
    register-with-eureka: true # 向注册中心注册自己
    fetch-registry: true # 拉取注册中心的信息
    service-url:
      defaultZone: http://127.0.0.1:7001/eureka,http://127.0.0.1:7002/eureka